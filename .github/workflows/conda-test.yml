name: Conda Self-Hosted Runner Test

on:
  workflow_dispatch:

jobs:
  test-conda:
    runs-on: self-hosted

    steps:
      - name: Check basic environment
        run: |
          echo "=== WHO AM I ==="
          whoami

          echo "=== PATH ==="
          echo $PATH

      - name: Try conda directly (NO activation)
        run: |
          echo "=== CONDA VERSION ==="
          conda --version

          echo "=== CONDA ENV LIST ==="
          conda env list